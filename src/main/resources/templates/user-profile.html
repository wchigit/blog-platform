<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${user.displayName != null and !user.displayName.isBlank() ? user.displayName : user.username} | Blog Platform|">User Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div th:replace="~{layout :: site-header}"></div>
<main class="container page-content">
    <section class="card profile-card">
        <p class="eyebrow">Author</p>
        <h1 th:text="${user.displayName != null and !user.displayName.isBlank() ? user.displayName : user.username}">User Name</h1>
        <p class="profile-handle" th:text="|@${user.username}|">@username</p>
        <p th:text="${user.bio}">User biography.</p>
        <div class="profile-meta">
            <span th:text="${user.email}">email@example.com</span>
            <span>•</span>
            <span th:text="|Joined ${#temporals.format(user.createdAt, 'MMM yyyy')}|">Joined Jan 2024</span>
        </div>
    </section>

    <section>
        <div class="section-header">
            <h2>Posts by this author</h2>
            <span class="badge" th:text="${#lists.size(posts)} + ' posts'">0 posts</span>
        </div>

        <div th:if="${#lists.isEmpty(posts)}" class="empty-state compact">
            <p>This author has not published anything yet.</p>
        </div>

        <div class="post-grid" th:if="${!#lists.isEmpty(posts)}">
            <article class="card post-card" th:each="post : ${posts}">
                <div class="post-card-meta">
                    <span th:text="${#temporals.format(post.createdAt, 'MMM d, yyyy')}">Jan 1, 2024</span>
                    <span th:text="${post.published ? 'Published' : 'Draft'}">Published</span>
                </div>
                <h3><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">Post title</a></h3>
                <p class="post-summary" th:text="${post.summary}">Summary</p>
                <div class="tag-list">
                    <span class="tag" th:each="tag : ${post.tags}" th:text="${tag.name}">Tag</span>
                </div>
            </article>
        </div>
    </section>
</main>
<div th:replace="~{layout :: site-footer}"></div>
</body>
</html>
